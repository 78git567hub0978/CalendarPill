<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f3ea">
    <title>Pill Calendar</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <section class="auth-gate" id="authGate" aria-live="polite">
      <div class="auth-gate__panel">
        <p class="eyebrow">Medicine log</p>
        <h1 id="authTitle">Loading</h1>
        <p id="authStatus">Checking your sign-in...</p>
        <p class="auth-error" id="authError" hidden></p>
        <button class="primary-action auth-gate__button" id="signInButton" type="button" hidden>Sign in with Google</button>
      </div>
    </section>

    <main class="app-shell" aria-label="Pill calendar logger" hidden>
      <p class="app-error" id="appError" hidden></p>
      <section class="status-strip" aria-live="polite">
        <div>
          <span class="schedule-label" id="headerScheduleLabel">Schedule is Every day at 07:00</span>
          <span class="status-label">Next dose</span>
          <p class="timer-line"><strong id="countdownStatus">Calculating</strong><span id="scheduleStatus">remaining until next dose</span></p>
        </div>
      </section>

      <section class="month-panel" aria-label="Medication calendar">
        <div class="month-controls">
          <button class="icon-button" id="prevMonth" type="button" aria-label="Previous month">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <h2 id="monthTitle"></h2>
          <button class="icon-button" id="nextMonth" type="button" aria-label="Next month">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>

        <div class="weekday-row" aria-hidden="true">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <ul class="legend-list" aria-label="Calendar color legend">
          <li><span class="legend-dot is-taken"></span>Taken</li>
          <li><span class="legend-dot is-off-schedule"></span>Taken late</li>
          <li><span class="legend-dot is-missed"></span>Missed</li>
          <li><span class="legend-dot is-future"></span>Upcoming</li>
        </ul>
      </section>

      <section class="detail-panel" aria-label="Selected day details">
        <div>
          <p class="eyebrow">Selected day</p>
          <h3 id="selectedTitle"></h3>
          <p id="selectedMeta"></p>
        </div>
        <div class="detail-actions">
          <button id="markTakenButton" class="primary-action" type="button">Mark taken</button>
        </div>
      </section>

      <section class="settings-panel" aria-label="Settings">
        <button id="openSettingsButton" class="primary-action settings-save" type="button">Settings</button>
      </section>
    </main>

    <div class="edit-dialog" id="editDialog" hidden>
      <div class="edit-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="editDialogTitle">
        <div class="edit-confirm" id="editConfirmPanel">
          <h2 id="editDialogTitle">Do you want to edit?</h2>
          <div class="edit-dialog__actions">
            <button id="editNoButton" class="dialog-action dialog-action--no" type="button">NO</button>
            <button id="editYesButton" class="dialog-action dialog-action--yes" type="button">YES</button>
          </div>
        </div>

        <form class="edit-form" id="editForm" hidden>
          <h2>Edit dose</h2>

          <label class="edit-field">
            <span>Time</span>
            <div class="time-wheel-picker" aria-label="Choose time">
              <div class="wheel-picker" id="editHourWheel" aria-label="Choose hour"></div>
              <div class="wheel-picker" id="editMinuteWheel" aria-label="Choose minute"></div>
            </div>
          </label>

          <label class="edit-field">
            <span>Notes</span>
            <textarea id="editNotesInput" rows="5" placeholder="Add notes"></textarea>
          </label>

          <div class="edit-dialog__actions">
            <button id="editCancelButton" class="dialog-action dialog-action--no" type="button">Cancel</button>
            <button class="dialog-action dialog-action--yes" type="submit">Save</button>
          </div>

          <button id="editClearButton" class="clear-log-action" type="button">Clear date and time</button>
        </form>
      </div>
    </div>

    <div class="edit-dialog" id="scheduleDialog" hidden>
      <div class="edit-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="scheduleDialogTitle">
        <form class="edit-form" id="scheduleForm">
          <h2 id="scheduleDialogTitle">Change schedule</h2>

          <label class="edit-field">
            <span>Date start</span>
            <input id="scheduleStartInput" type="text" inputmode="none" readonly required>
          </label>

          <label class="edit-field">
            <span>End date</span>
            <input id="scheduleEndInput" type="text" inputmode="none" readonly>
          </label>

          <div class="date-picker" id="scheduleDatePicker" hidden>
            <div class="date-picker__controls">
              <button class="icon-button" id="datePickerPrev" type="button" aria-label="Previous month">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <h3 id="datePickerTitle"></h3>
              <button class="icon-button" id="datePickerNext" type="button" aria-label="Next month">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
            <div class="date-picker__weekdays" aria-hidden="true">
              <span>S</span>
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
              <span>S</span>
            </div>
            <div class="date-picker__grid" id="scheduleDatePickerGrid"></div>
          </div>

          <label class="edit-field">
            <span>Time</span>
            <div class="time-wheel-picker settings-wheel-picker" aria-label="Choose schedule time">
              <div class="wheel-picker" id="scheduleHourWheel" aria-label="Choose schedule hour"></div>
              <div class="wheel-picker" id="scheduleMinuteWheel" aria-label="Choose schedule minute"></div>
            </div>
          </label>

          <div class="edit-dialog__actions">
            <button id="cancelScheduleButton" class="dialog-action dialog-action--no" type="button">Cancel</button>
            <button class="dialog-action dialog-action--yes" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
